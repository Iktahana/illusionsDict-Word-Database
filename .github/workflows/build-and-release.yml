name: Build SQLite & Release

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  packages: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Generate version tag
        id: version
        run: |
          VERSION=$(date -u +'%Y.%-m.%-d.%H%M%S')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Build SQLite database
        run: python script/json_to_sqlite.py
        env:
          GENJI_VERSION: ${{ steps.version.outputs.version }}
          GENJI_COMMIT: ${{ github.sha }}
          GENJI_BRANCH: ${{ github.ref_name }}
          GENJI_REPO: ${{ github.server_url }}/${{ github.repository }}

      - name: Compress database
        run: gzip -9 -k genji.db

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          body: |
            Automated SQLite build from commit ${{ github.sha }}

            Branch: `${{ github.ref_name }}`
          files: |
            genji.db.gz

      # ビルド済み DB を後続ジョブに渡す
      - name: Upload DB artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v6
        with:
          name: genji-db
          path: genji.db
          retention-days: 1

  # main ブランチのみ: Docker イメージをビルドして GHCR にプッシュ
  docker:
    if: github.ref == 'refs/heads/main'
    needs: build-and-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # ビルド済み DB をダウンロード（再ビルド不要）
      - name: Download DB artifact
        uses: actions/download-artifact@v8
        with:
          name: genji-db

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/iktahana/genji:latest
            ghcr.io/iktahana/genji:${{ needs.build-and-release.outputs.version }}

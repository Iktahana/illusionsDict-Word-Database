services:
  generate-examples:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GIT_USER_NAME: "illusionsDict Bot"
        GIT_USER_EMAIL: "bot@illusions-dict.local"
    image: illusions-dict-generate-examples
    volumes:
      # Mount entire repo so git auto-commit works
      - .:/app
      # Use host's gemini credentials (OAuth or API key, whatever is configured)
      - ${HOME}/.gemini:/root/.gemini:ro
    working_dir: /app
    # Override the CMD to pass script args (e.g. --status, --clear-checkpoint)
    # command: ["--status"]
    restart: "no"
